name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["[0-9]*.*"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: fhir2sphn:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container 
        run: |
          docker compose -f docker/docker-compose.yml up -d 
          sleep 60
          docker compose -f docker/docker-compose.yml logs

      - name: Run tests
        run: pytest tests/ --skip-sds -v # SDs have been built when building the container

      - name: Dump container logs
        if: always()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Stop container
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            RANGE="${{ steps.prev_tag.outputs.tag }}..${{ github.ref_name }}"
          else
            RANGE="HEAD"
          fi
          {
            echo "body<<EOF"
            git log $RANGE --oneline
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: fhir2sphn:${{ github.ref_name }}
          load: true
          cache-from: type=gha
