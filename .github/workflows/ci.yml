name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["[0-9]*.*"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: fhir2sphn:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container 
        run: |
          docker compose -f docker/docker-compose.yml up -d 
          sleep 60
          docker compose -f docker/docker-compose.yml logs

      - name: Run tests
        run: pytest tests/ --skip-sds -v # SDs have been built when building the container

      - name: Dump container logs
        if: always()
        run: docker compose -f docker/docker-compose.yml logs

      - name: Stop container
        if: always()
        run: docker compose -f docker/docker-compose.yml down

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            RANGE="${{ steps.prev_tag.outputs.tag }}..${{ github.ref_name }}"
          else
            RANGE="HEAD"
          fi
          {
            echo "body<<EOF"
            git log $RANGE --oneline
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Is stable release
        id: stable
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "yes=true" >> $GITHUB_OUTPUT
          else
            echo "yes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/fhir2sphn:${{ github.ref_name }}
            ${{ steps.stable.outputs.yes == 'true' && format('ghcr.io/{0}/fhir2sphn:latest', steps.owner.outputs.name) || '' }}
          push: true
          cache-from: type=gha

      - name: Prepare docker-compose.yml for release
        run: |
          sed 's|:latest|:${{ github.ref_name }}|' docker/docker-compose.prod.yml > docker-compose.yml

      - name: Upload docker-compose.yml to release
        uses: softprops/action-gh-release@v2
        with:
          files: docker-compose.yml
